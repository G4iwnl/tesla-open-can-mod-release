name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work. Include CAN IDs, bit positions, or UI mockups if relevant.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Feature scope
      options:
        - CAN frame modification (new handler or signal)
        - CAN signal monitoring (read-only)
        - Web UI improvement
        - New board / hardware support
        - Build / tooling
        - Documentation
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
