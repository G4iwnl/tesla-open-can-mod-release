name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: dropdown
    id: board
    attributes:
      label: Board / Hardware
      options:
        - Waveshare ESP32-S3-RS485-CAN
        - ESP32 DevKit + SN65HVD230
        - M5Stack Atomic CAN Base
        - M5Stack AtomS3 + CAN Base
        - LilyGo T-CAN485
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Firmware Version
      description: "Check in web UI → System tab or `include/version.h`"
      placeholder: "e.g. 1.6.1"
    validations:
      required: true

  - type: dropdown
    id: hw_mode
    attributes:
      label: Hardware Mode
      options:
        - Legacy (HW1/HW2)
        - HW3
        - HW4
    validations:
      required: true

  - type: input
    id: tesla_firmware
    attributes:
      label: Tesla Vehicle Firmware
      placeholder: "e.g. 2026.2.9.3"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include steps to reproduce if possible.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste serial output, web UI screenshots, or CAN frame dumps.
      render: text
